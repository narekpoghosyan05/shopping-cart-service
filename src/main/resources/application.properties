spring.kafka.bootstrap-servers=localhost:9092# PostgreSQL DB settings
spring.datasource.url=jdbc:postgresql://localhost:5432/shopping_cart
spring.datasource.username=cart_user
spring.datasource.password=cart123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=cart_schema

# Optional: Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE